apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-vip
  namespace: kube-system

spec:
  selector:
    matchLabels:
      app: kube-vip

  template:
    metadata:
      labels:
        app: kube-vip

    spec:
      hostNetwork: true
      serviceAccountName: kube-vip

      containers:
        - name: kube-vip
          image: ghcr.io/kube-vip/kube-vip:v0.8.0

          args:
            - manager

          env:
            - name: vip_interface
              value: enp3s0

            - name: svc_enable
              value: "true"

            - name: vip_arp
              value: "true"

            - name: svc_election
              value: "true"

            - name: node_name
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW

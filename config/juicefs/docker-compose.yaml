services:
  juicefs:
    image: juicedata/mount:ce-v1.3.0
    container_name: juicefs

    privileged: true
    restart: unless-stopped

    env_file:
      - juicefs.env

    cap_add:
      - SYS_ADMIN

    devices:
      - /dev/fuse:/dev/fuse

    security_opt:
      - apparmor:unconfined

    volumes:
      # Host mountpoint where JuiceFS will appear
      - /mnt/raid/juicefs:/mnt:rw,rshared

    command:
      [
        "juicefs",
        "mount",
        "--storage", "s3",
        "--bucket", "$$BUCKET",
        "$$METAURL",
        "/mnt"
      ]

    healthcheck:
      test: ["CMD-SHELL", "cat /mnt/.control >/dev/null 2>&1 || ls /mnt >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

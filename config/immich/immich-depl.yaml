apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: immich
  template:
    metadata:
      labels:
        app: immich
    spec:
      containers:
        #
        # IMMICH SERVER
        #
        - name: immich-server
          image: ghcr.io/immich-app/immich-server:release

          securityContext:
            privileged: true

          env:
            - name: ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: immich-s3
                  key: accessKeyId

            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: immich-s3
                  key: secretAccessKey

            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP

            - name: IMMICH_PORT
              value: "2283"

            - name: DB_HOSTNAME
              value: localhost

            - name: DB_PORT
              value: "5432"

            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: immich-db
                  key: username

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: immich-db
                  key: password

            - name: DB_DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: immich-db
                  key: database


          command:
            - sh
            - -c
            - |
              set -e

              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y s3fs fuse postgresql-client

              mkdir -p /mnt/object-storage

              echo "$ACCESS_KEY:$SECRET_KEY" > /tmp/passwd-s3fs
              chmod 600 /tmp/passwd-s3fs

              s3fs immich-bucket /mnt/object-storage \
                -o url=http://$NODE_IP:9000 \
                -o use_path_request_style \
                -o passwd_file=/tmp/passwd-s3fs \
                -o allow_other \
                -o uid=1000 \
                -o gid=1000 \
                -o mp_umask=002

              echo "127.0.0.1 redis" >> /etc/hosts


              exec start.sh

          ports:
            - containerPort: 2283

          volumeMounts:
            - name: immich-minio
              mountPath: /data


          resources:
            requests:
              cpu: "100m"
              memory: "500Mi"
            limits:
              cpu: "3000m"
              memory: "8Gi"

        #
        # MACHINE LEARNING
        #
        - name: immich-ml
          image: ghcr.io/immich-app/immich-machine-learning:release

          env:
            - name: IMMICH_PORT
              value: "2283"
            - name: ML_CACHE_DIR
              value: /cache

          volumeMounts:
            - name: immich-minio
              mountPath: /cache

          resources:
            requests:
              cpu: "100m"
              memory: "500Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"

        #
        # REDIS
        #
        - name: redis
          image: docker.io/valkey/valkey:9

          resources:
            requests:
              cpu: "50m"
              memory: "100Mi"

        #
        # POSTGRES
        #
        - name: postgres
          image: tensorchord/pgvecto-rs:pg14-v0.2.0

          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: immich-db
                  key: username

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: immich-db
                  key: password

            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: immich-db
                  key: database

            - name: PGDATA
              value: /var/lib/postgresql/data

          volumeMounts:
            - name: immich-juicefs
              mountPath: /var/lib/postgresql/data
              subPath: postgres

          resources:
            requests:
              cpu: "100m"
              memory: "500Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"

      volumes:
        #
        # S3FS mount target
        #
        - name: immich-minio
          emptyDir: {}

        #
        # JuiceFS shared host mount
        #
        - name: immich-juicefs
          hostPath:
            path: /mnt/juicefs/immich
            type: DirectoryOrCreate


---
apiVersion: v1
kind: Service
metadata:
  name: immich
spec:
  selector:
    app: immich
  ports:
    - port: 80
      targetPort: 2283
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: immich
  annotations:
    kubernetes.io/ingress.class: traefik

spec:
  rules:
    - host: immich.colins.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: immich
                port:
                  number: 80

  tls:
    - hosts:
        - immich.colins.io
      secretName: wildcard-colins-io-tls

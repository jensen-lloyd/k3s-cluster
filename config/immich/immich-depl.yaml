apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich
spec:
  replicas: 1
  selector:
    matchLabels:
      app: immich
  template:
    metadata:
      labels:
        app: immich
    spec:
      volumes:
        # Main data (JuiceFS)
        - name: immich-data
          hostPath:
            path: /mnt/juicefs/immich

        # Postgres
        - name: postgres-data
          hostPath:
            path: /mnt/juicefs/immich/postgres

        # ML cache (node local)
        - name: model-cache
          hostPath:
            path: /tmp/immich-cache

      containers:

        # ------------------------
        # IMMICH SERVER
        # ------------------------
        - name: immich-server
          image: ghcr.io/immich-app/immich-server:release
          ports:
            - containerPort: 2283

          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"

          env:
            - name: DB_HOSTNAME
              value: localhost
            - name: DB_USERNAME
              value: postgres
            - name: DB_PASSWORD
              value: postgres
            - name: DB_DATABASE_NAME
              value: immich

            - name: REDIS_HOSTNAME
              value: localhost

            ###FROM EXAMPLE .ENV FOR USE WITH DOCKER-COMPOSE
            - name: IMMICH_PORT
              value: "2283"

            - name: UPLOAD_LOCATION
              value: ./library

            - name: DB_DATA_LOCATION
              value: ./postgres

            - name: IMMICH_VERSION
              value: v2.7.5

          volumeMounts:
            - name: immich-data
              mountPath: /data


        # ------------------------
        # MACHINE LEARNING
        # ------------------------
        - name: immich-ml
          image: ghcr.io/immich-app/immich-machine-learning:release

          resources:
            requests:
              cpu: "250m"
              memory: "100Mi"
            limits:
              cpu: "1250M"
              memory: "2Gi"

          env:
            - name: TRANSFORMERS_CACHE
              value: /cache

            - name: IMMICH_PORT 
              value: 2283

          volumeMounts:
            - name: model-cache
              mountPath: /cache

        # ------------------------
        # REDIS
        # ------------------------
        - name: redis
          image: docker.io/valkey/valkey:9


        # ------------------------
        # POSTGRES
        # ------------------------
        - name: postgres
          image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0

          env:
            - name: POSTGRES_DB
              value: immich
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres

          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data

---
apiVersion: v1
kind: Service
metadata:
  name: immich
spec:
  selector:
    app: immich
  ports:
    - port: 80
      targetPort: 2283
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: immich
  annotations:
    kubernetes.io/ingress.class: traefik

spec:
  rules:
    - host: immich.colins.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: immich
                port:
                  number: 80

  tls:
    - hosts:
        - immich.colins.io
      secretName: wildcard-colins-io-tls

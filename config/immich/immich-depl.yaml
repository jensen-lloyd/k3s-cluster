apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich
spec:
  replicas: 1
  selector:
    matchLabels:
      app: immich
  template:
    metadata:
      labels:
        app: immich
    spec:
      volumes:
        # Main data (JuiceFS)
        - name: immich-data
          hostPath:
            path: /mnt/juicefs/immich

        # Postgres
        - name: postgres-data
          hostPath:
            path: /mnt/juicefs/immich/postgres

        # ML cache (node local)
        - name: model-cache
          hostPath:
            path: /tmp/immich-cache

      containers:

        # ------------------------
        # IMMICH SERVER
        # ------------------------
        - name: immich-server
          image: ghcr.io/immich-app/immich-server:release
          ports:
            - containerPort: 2283

          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "2Gi"

          env:
            - name: DB_HOSTNAME
              value: localhost
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: immich-db
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: immich-db
                  key: password
            - name: DB_DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: immich-db
                  key: database

            - name: REDIS_HOSTNAME
              value: localhost

          volumeMounts:
            - name: immich-data
              mountPath: /data

            # 🔥 This overrides ONLY /data/upload
            - name: upload-data
              mountPath: /data/upload

        # ------------------------
        # MICROSERVICES
        # ------------------------
        - name: immich-microservices
          image: ghcr.io/immich-app/immich-server:release
          command: ["start-microservices.sh"]

          resources:
            requests:
              cpu: ""
              memory: ""
            limits:
              cpu: ""
              memory: ""

          env:
            - name: DB_HOSTNAME
              value: localhost
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: immich-db
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: immich-db
                  key: password
            - name: DB_DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: immich-db
                  key: database

            - name: REDIS_HOSTNAME
              value: localhost

          volumeMounts:
            - name: immich-data
              mountPath: /data
            - name: upload-data
              mountPath: /data/upload

        # ------------------------
        # MACHINE LEARNING
        # ------------------------
        - name: immich-ml
          image: ghcr.io/immich-app/immich-machine-learning:release

          resources:
            requests:
              cpu: "250m"
              memory: "100m"
            limits:
              cpu: "1250M"
              memory: "2Gi"

          env:
            - name: TRANSFORMERS_CACHE
              value: /cache

          volumeMounts:
            - name: model-cache
              mountPath: /cache

        # ------------------------
        # REDIS
        # ------------------------
        - name: redis
          image: redis:7-alpine

        # ------------------------
        # POSTGRES
        # ------------------------
        - name: postgres
          image: tensorchord/pgvecto-rs:pg14-v0.2.0

          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: immich-db
                  key: database
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: immich-db
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: immich-db
                  key: password

          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data

---
apiVersion: v1
kind: Service
metadata:
  name: immich
spec:
  selector:
    app: immich
  ports:
    - port: 80
      targetPort: 2283
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: immich
  annotations:
    kubernetes.io/ingress.class: traefik

spec:
  rules:
    - host: immich.colins.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: immich
                port:
                  number: 80

  tls:
    - hosts:
        - immich.colins.io
      secretName: wildcard-colins-io-tls

apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-server
  namespace: immich
spec:
  replicas: 1
  selector:
    matchLabels:
      app: immich-server
  template:
    metadata:
      labels:
        app: immich-server
    spec:
      volumes:
        # Existing data (JuiceFS etc)
        - name: immich-data
          hostPath:
            path: /mnt/juicefs/immich

        # Shared volume for S3 mount
        - name: immich-media
          emptyDir: {}

      containers:

        # ------------------------
        # S3FUSE SIDECAR
        # ------------------------
        - name: s3fuse
          image: ubuntu:24.04

          securityContext:
            privileged: true

          env:
            - name: ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: immich-s3
                  key: accessKeyId

            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: immich-s3
                  key: secretAccessKey

            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP

          command:
            - sh
            - -c
            - |
              set -e

              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y s3fs fuse

              mkdir -p /mnt/s3fuse

              echo "$ACCESS_KEY:$SECRET_KEY" > /tmp/passwd-s3fs
              chmod 600 /tmp/passwd-s3fs

              s3fs immich-backup /mnt/s3fuse -f \
                -o url=http://$NODE_IP:9000 \
                -o use_path_request_style \
                -o passwd_file=/tmp/passwd-s3fs \
                -o allow_other \
                -o uid=1000 \
                -o gid=1000 \
                -o mp_umask=002 \
                -o nonempty

          volumeMounts:
            - name: immich-media
              mountPath: /mnt/s3fuse

        # ------------------------
        # IMMICH SERVER
        # ------------------------
        - name: immich-server
          image: ghcr.io/immich-app/immich-server:release

          ports:
            - containerPort: 2283

          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"

          env:
            - name: DB_HOSTNAME
              value: postgres
            - name: DB_USERNAME
              value: postgres
            - name: DB_PASSWORD
              value: postgres
            - name: DB_DATABASE_NAME
              value: immich

            - name: REDIS_HOSTNAME
              value: redis
            - name: REDIS_PORT
              value: "6379"

            - name: IMMICH_MACHINE_LEARNING_URL
              value: http://immich-ml:3003

            - name: IMMICH_PORT
              value: "2283"

            - name: UPLOAD_LOCATION
              value: /data/library

            - name: DB_DATA_LOCATION
              value: /data/postgres

            - name: IMMICH_VERSION
              value: v2.7.5

          volumeMounts:
            # mount base data FIRST
            - name: immich-data
              mountPath: /data

            # then overlay S3 mount
            - name: immich-media
              mountPath: /data/library

---
apiVersion: v1
kind: Service
metadata:
  name: immich-server
  namespace: immich
spec:
  selector:
    app: immich-server
  ports:
    - port: 2283
      targetPort: 2283

apiVersion: v1
kind: Service
metadata:
  name: traefik
  namespace: kube-system
  annotations:
    kube-vip.io/loadbalancerIPs: "10.0.1.100"

spec:
  type: LoadBalancer

  selector:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/instance: traefik-kube-system

  ports:
    - name: web
      port: 80
      targetPort: web

    - name: websecure
      port: 443
      targetPort: websecure
